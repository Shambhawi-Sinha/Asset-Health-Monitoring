version: "3.9"

# docker-compose up
# Starts FastAPI backend (port 5000) and React frontend (port 3000).
# Both run in mock mode by default — no Oracle or Azure credentials needed.
#
# To switch to live mode:
#   1. Copy .env.example to .env and fill in real credentials
#   2. Set MOCK_MODE=false and REACT_APP_MOCK_MODE=false
#   3. Mount your OCI wallet: uncomment the volumes section under api

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - CORS_ORIGIN=http://localhost:3000
      - OCI_DB_USERNAME=${OCI_DB_USERNAME:-}
      - OCI_DB_PASSWORD=${OCI_DB_PASSWORD:-}
      - OCI_DB_DSN=${OCI_DB_DSN:-}
      - OCI_WALLET_DIR=/app/wallet
      - OCI_WALLET_PASSWORD=${OCI_WALLET_PASSWORD:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT_GPT4=${AZURE_OPENAI_DEPLOYMENT_GPT4:-gpt-4}
      - AZURE_OPENAI_DEPLOYMENT_EMBED=${AZURE_OPENAI_DEPLOYMENT_EMBED:-text-embedding-ada-002}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-01}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT:-}
      - AZURE_SEARCH_API_KEY=${AZURE_SEARCH_API_KEY:-}
      - AZURE_SEARCH_INDEX_NAME=${AZURE_SEARCH_INDEX_NAME:-substation-docs}
      - AZURE_VISION_ENDPOINT=${AZURE_VISION_ENDPOINT:-}
      - AZURE_VISION_API_KEY=${AZURE_VISION_API_KEY:-}
      - FULCRUM_API_KEY=${FULCRUM_API_KEY:-}
      - FULCRUM_BASE_URL=${FULCRUM_BASE_URL:-https://api.fulcrumapp.com/api/v2}
    # Uncomment to mount real wallet files for live Oracle connection:
    # volumes:
    #   - /path/to/your/wallet:/app/wallet:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_MOCK_MODE=${REACT_APP_MOCK_MODE:-true}
      - REACT_APP_API_BASE=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true   # needed for file watching inside Docker on some hosts
    command: sh -c "npm install && npm start"
    depends_on:
      api:
        condition: service_healthy
    stdin_open: true
